<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Sign In | PawBandhan</title>
    
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="pb-public.css">
    <script src="config.js"></script>
    <script src="paw-api.js"></script>
    <style>
        body.pb-public {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            position: relative;
        }
        .admin-auth-card {
            background: var(--bg-surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            box-shadow: var(--glass-shadow);
            position: relative;
            z-index: 10;
        }
        .admin-auth-icon {
            width: 56px;
            height: 56px;
            border-radius: var(--radius-md);
            background: rgba(16, 185, 129, 0.1);
            color: var(--brand-primary);
            display: grid;
            place-items: center;
            font-size: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(16, 185, 129, 0.2);
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.15);
        }
        .admin-auth-card h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }
        .admin-auth-card .lead {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }
        .admin-field {
            margin-bottom: 1.25rem;
        }
        .admin-field label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }
        .admin-field input {
            width: 100%;
            padding: 1rem 1.25rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            color: var(--text-main);
            font-family: var(--font-body);
            font-size: 1rem;
            transition: all 0.3s;
        }
        .admin-field input:focus {
            outline: none;
            border-color: var(--brand-primary);
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }
        .admin-error {
            display: none;
            margin-bottom: 1rem;
            padding: 1rem;
            border-radius: var(--radius-sm);
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.2);
            font-size: 0.9rem;
            font-weight: 500;
        }
        .admin-error.visible { display: block; }
        
        .admin-back {
            display: block;
            text-align: center;
            margin-top: 2rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            text-decoration: none;
            transition: color 0.3s;
        }
        .admin-back:hover { color: var(--brand-primary); }
    </style>
</head>
<body class="pb-public">

    <!-- Ambient Background Elements -->
    <div class="ambient-bg">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="glow-orb orb-3"></div>
    </div>
    <div class="pb-paw-bg" aria-hidden="true"></div>

    <div class="admin-auth-card">
        <div class="admin-auth-icon"><i class="fas fa-shield-halved"></i></div>
        <h1>Admin Command Center</h1>
        <p class="lead">Secure access for verified PawBandhan administrators and NGO partners.</p>

        <div id="adminError" class="admin-error" role="alert"></div>

        <form id="adminForm">
            <div class="admin-field">
                <label for="adminEmail">Email Address</label>
                <input type="email" id="adminEmail" name="email" autocomplete="username" required placeholder="admin@pawbandhan.com">
            </div>
            <div class="admin-field">
                <label for="adminPassword">Security Password</label>
                <input type="password" id="adminPassword" name="password" autocomplete="current-password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-glass-primary" id="adminSubmit" style="width:100%; justify-content:center; margin-top:1rem;">
                Authenticate <i class="fas fa-lock"></i>
            </button>
        </form>

        <a href="index.html" class="admin-back"><i class="fas fa-arrow-left"></i> Return to main site</a>
    </div>

    <script src="paw-admin-auth.js"></script>
    <script>
        (async function () {
            if (PawAdminAuth.isAuthenticated() && await PawAdminAuth.verifySession()) {
                window.location.href = 'admin_portal.html';
                return;
            }
            PawAdminAuth.clear();

            const form = document.getElementById('adminForm');
            const errEl = document.getElementById('adminError');
            const btn = document.getElementById('adminSubmit');

            form.addEventListener('submit', async function (e) {
                e.preventDefault();
                errEl.classList.remove('visible');
                errEl.textContent = '';
                btn.disabled = true;
                btn.innerHTML = 'Authenticating… <i class="fas fa-spinner fa-spin"></i>';
                try {
                    await PawAdminAuth.login(
                        document.getElementById('adminEmail').value.trim(),
                        document.getElementById('adminPassword').value
                    );
                    window.location.href = 'admin_portal.html';
                } catch (err) {
                    errEl.textContent = err.message || 'Authentication failed. Please verify credentials.';
                    errEl.classList.add('visible');
                    btn.disabled = false;
                    btn.innerHTML = 'Authenticate <i class="fas fa-lock"></i>';
                }
            });
        })();
    </script>
</body>
</html>
