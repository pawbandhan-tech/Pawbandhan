<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin sign in | PawBandhan</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=Fraunces:opsz,wght@9..144,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="pb-public.css">
    <script src="config.js"></script>
    <script src="paw-api.js"></script>
    <style>
        body.pb-public {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background: linear-gradient(160deg, #0f172a 0%, #134e4a 55%, #f0fdfa 100%);
        }
        .admin-auth-card {
            width: 100%;
            max-width: 420px;
            background: #fff;
            border-radius: 28px;
            padding: 44px 40px;
            box-shadow: 0 40px 100px -24px rgba(15, 23, 42, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .admin-auth-icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: #f0fdfa;
            color: var(--pb-brand);
            display: grid;
            place-items: center;
            font-size: 1.4rem;
            margin-bottom: 20px;
        }
        .admin-auth-card h1 {
            font-family: var(--pb-display);
            font-size: 1.6rem;
            color: var(--pb-ink);
            margin-bottom: 8px;
        }
        .admin-auth-card .lead {
            color: var(--pb-muted);
            font-size: 0.95rem;
            margin-bottom: 28px;
            line-height: 1.5;
        }
        .admin-field {
            margin-bottom: 18px;
        }
        .admin-field label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 8px;
            color: var(--pb-ink);
        }
        .admin-field input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--pb-border);
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
        }
        .admin-field input:focus {
            outline: none;
            border-color: var(--pb-brand);
            box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.2);
        }
        .admin-error {
            display: none;
            margin-bottom: 16px;
            padding: 12px 14px;
            border-radius: 12px;
            background: #fef2f2;
            color: #b91c1c;
            font-size: 0.88rem;
        }
        .admin-error.visible { display: block; }
        .admin-submit {
            width: 100%;
            margin-top: 8px;
            padding: 16px;
            border: none;
            border-radius: 14px;
            background: #0f172a;
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            font-family: inherit;
        }
        .admin-submit:hover { background: #1e293b; }
        .admin-submit:disabled { opacity: 0.6; cursor: not-allowed; }
        .admin-back {
            display: block;
            text-align: center;
            margin-top: 24px;
            color: var(--pb-muted);
            font-size: 0.88rem;
            text-decoration: none;
        }
        .admin-back:hover { color: var(--pb-brand); }
    </style>
</head>
<body class="pb-public">

    <div class="admin-auth-card">
        <div class="admin-auth-icon"><i class="fas fa-shield-halved"></i></div>
        <h1>Admin command</h1>
        <p class="lead">Sign in with your PawBandhan administrator account. Access is verified on the server.</p>

        <div id="adminError" class="admin-error" role="alert"></div>

        <form id="adminForm">
            <div class="admin-field">
                <label for="adminEmail">Email</label>
                <input type="email" id="adminEmail" name="email" autocomplete="username" required placeholder="admin@pawbandhan.com">
            </div>
            <div class="admin-field">
                <label for="adminPassword">Password</label>
                <input type="password" id="adminPassword" name="password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="admin-submit" id="adminSubmit">Sign in</button>
        </form>

        <a href="index.html" class="admin-back"><i class="fas fa-arrow-left"></i> Back to public site</a>
    </div>

    <script src="paw-admin-auth.js"></script>
    <script>
        (async function () {
            if (PawAdminAuth.isAuthenticated() && await PawAdminAuth.verifySession()) {
                window.location.href = 'admin_portal.html';
                return;
            }
            PawAdminAuth.clear();

            const form = document.getElementById('adminForm');
            const errEl = document.getElementById('adminError');
            const btn = document.getElementById('adminSubmit');

            form.addEventListener('submit', async function (e) {
                e.preventDefault();
                errEl.classList.remove('visible');
                errEl.textContent = '';
                btn.disabled = true;
                btn.textContent = 'Signing in…';
                try {
                    await PawAdminAuth.login(
                        document.getElementById('adminEmail').value.trim(),
                        document.getElementById('adminPassword').value
                    );
                    window.location.href = 'admin_portal.html';
                } catch (err) {
                    errEl.textContent = err.message || 'Sign in failed';
                    errEl.classList.add('visible');
                    btn.disabled = false;
                    btn.textContent = 'Sign in';
                }
            });
        })();
    </script>
</body>
</html>
