<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGO Partner | PawBandhan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="pb-design-system.css">
    <style>
        .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; position: relative; }
        .auth-card { background: var(--pb-white); border-radius: var(--pb-radius-2xl); padding: 3rem; width: 100%; max-width: 480px; box-shadow: var(--pb-shadow-xl); position: relative; z-index: 1; }
        .auth-logo { width: 64px; height: 64px; background: linear-gradient(135deg, var(--pb-teal), var(--pb-teal-light)); border-radius: var(--pb-radius-xl); display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; color: white; font-size: 1.75rem; box-shadow: var(--pb-shadow-glow-teal); }
        .auth-title { text-align: center; font-size: 1.75rem; font-weight: 800; margin-bottom: 0.5rem; }
        .auth-subtitle { text-align: center; color: var(--pb-text-muted); margin-bottom: 2rem; }
        .auth-tabs { display: flex; gap: 0.5rem; background: var(--pb-cream); padding: 0.375rem; border-radius: var(--pb-radius-lg); margin-bottom: 1.5rem; }
        .auth-tab { flex: 1; padding: 0.75rem; border: none; background: transparent; border-radius: var(--pb-radius-md); font-family: inherit; font-weight: 600; cursor: pointer; transition: all 0.2s ease; color: var(--pb-text-muted); }
        .auth-tab.active { background: var(--pb-white); color: var(--pb-teal); box-shadow: var(--pb-shadow-sm); }
        .auth-form { display: none; }
        .auth-form.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .demo-notice { background: var(--pb-teal-soft); border: 1px solid rgba(32, 201, 151, 0.3); border-radius: var(--pb-radius-lg); padding: 1rem; margin-bottom: 1.5rem; font-size: 0.875rem; color: var(--pb-teal-dark); }
        .demo-notice strong { display: block; margin-bottom: 0.25rem; }
        .pb-input-icon { position: relative; }
        .pb-input-icon i { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--pb-text-muted); }
        .pb-input-icon .pb-input { padding-left: 2.75rem; }
        .auth-footer { text-align: center; margin-top: 1.5rem; color: var(--pb-text-muted); font-size: 0.875rem; }
        .auth-footer a { color: var(--pb-teal); font-weight: 600; }
        .feature-list { margin-top: 1.5rem; padding: 1.5rem; background: var(--pb-cream); border-radius: var(--pb-radius-xl); }
        .feature-list h4 { font-size: 0.9rem; font-weight: 700; margin-bottom: 1rem; color: var(--pb-text); }
        .feature-list ul { list-style: none; }
        .feature-list li { display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 0; font-size: 0.875rem; color: var(--pb-text-secondary); }
        .feature-list li i { color: var(--pb-teal); width: 20px; }
    </style>
</head>
<body>
    <div class="pb-ambient-bg">
        <div class="pb-orb pb-orb-teal pb-orb-1"></div>
        <div class="pb-orb pb-orb-gold pb-orb-2"></div>
    </div>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo"><i class="fas fa-building-ngo"></i></div>
            <h1 class="auth-title">NGO Partner Portal</h1>
            <p class="auth-subtitle">Join India's largest animal rescue network</p>
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">Sign In</button>
                <button class="auth-tab" data-tab="register">Register</button>
            </div>
            <div class="demo-notice">
                <strong><i class="fas fa-info-circle"></i> Demo Mode</strong>
                Use any credentials to explore the NGO dashboard.
            </div>
            <form class="auth-form active" id="loginForm">
                <div class="pb-form-group">
                    <label class="pb-label">Organization Email</label>
                    <div class="pb-input-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" class="pb-input" id="loginEmail" placeholder="contact@yourorg.org" required>
                    </div>
                </div>
                <div class="pb-form-group">
                    <label class="pb-label">Password</label>
                    <div class="pb-input-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" class="pb-input" id="loginPassword" placeholder="Your password" required>
                    </div>
                </div>
                <button type="submit" class="pb-btn pb-btn-teal pb-btn-lg pb-w-full">
                    <i class="fas fa-sign-in-alt"></i>
                    Access Dashboard
                </button>
            </form>
            <form class="auth-form" id="registerForm">
                <div class="pb-form-group">
                    <label class="pb-label">Organization Name</label>
                    <div class="pb-input-icon">
                        <i class="fas fa-building"></i>
                        <input type="text" class="pb-input" id="regOrg" placeholder="Your NGO name" required>
                    </div>
                </div>
                <div class="pb-form-group">
                    <label class="pb-label">Contact Email</label>
                    <div class="pb-input-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" class="pb-input" id="regEmail" placeholder="contact@ngo.org" required>
                    </div>
                </div>
                <div class="pb-form-group">
                    <label class="pb-label">Phone</label>
                    <div class="pb-input-icon">
                        <i class="fas fa-phone"></i>
                        <input type="tel" class="pb-input" id="regPhone" placeholder="+91 98765 43210" required>
                    </div>
                </div>
                <div class="pb-form-group">
                    <label class="pb-label">Registration Number</label>
                    <div class="pb-input-icon">
                        <i class="fas fa-id-card"></i>
                        <input type="text" class="pb-input" id="regNumber" placeholder="NGO Registration No." required>
                    </div>
                </div>
                <button type="submit" class="pb-btn pb-btn-teal pb-btn-lg pb-w-full">
                    <i class="fas fa-paper-plane"></i>
                    Apply for Partnership
                </button>
            </form>
            <div class="feature-list">
                <h4>Partner Benefits</h4>
                <ul>
                    <li><i class="fas fa-check-circle"></i> Real-time rescue case management</li>
                    <li><i class="fas fa-check-circle"></i> GPS-tracked field operations</li>
                    <li><i class="fas fa-check-circle"></i> Medical report generation</li>
                    <li><i class="fas fa-check-circle"></i> Community volunteer network</li>
                </ul>
            </div>
            <div class="auth-footer">
                <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Home</a>
            </div>
        </div>
    </div>
    <script>
        document.querySelectorAll('.auth-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab + 'Form').classList.add('active');
            });
        });
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            sessionStorage.setItem('demo_session', 'true');
            sessionStorage.setItem('ngo_name', 'Rescue Foundation');
            window.location.href = 'ngo_dashboard.html';
        });
        document.getElementById('registerForm').addEventListener('submit', (e) => {
            e.preventDefault();
            sessionStorage.setItem('demo_session', 'true');
            sessionStorage.setItem('ngo_name', document.getElementById('regOrg').value);
            window.location.href = 'ngo_dashboard.html';
        });
    </script>
</body>
</html>
