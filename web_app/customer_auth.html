<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer sign in | PawBandhan</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&family=Fraunces:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="pb-public.css">
    <script src="config.js"></script>
</head>
<body class="pb-public pb-auth-page">

    <div class="pb-auth-card">
        <a href="index.html" class="pb-brand" style="margin-bottom:24px;">
            <span class="pb-brand-icon"><i class="fas fa-paw"></i></span> PawBandhan
        </a>
        <div class="pb-auth-tabs">
            <div class="pb-auth-tab active" id="tab-login" onclick="showAuthTab('login')">Sign in</div>
            <div class="pb-auth-tab" id="tab-signup" onclick="showAuthTab('signup')">Create account</div>
        </div>

        <form id="loginForm" class="auth-form active" onsubmit="return handleLogin(event)">
            <h2 class="pb-display" style="font-size:1.5rem;margin-bottom:8px;">Welcome back</h2>
            <p style="color:var(--pb-muted);margin-bottom:20px;font-size:0.9rem;">Report and track animal rescues near you.</p>
            <input type="email" id="loginEmail" class="pb-field" placeholder="Email" required>
            <input type="password" id="loginPassword" class="pb-field" placeholder="Password or access code" required>
            <p style="font-size:0.75rem;color:var(--pb-muted);margin-bottom:16px;">Admin-created accounts: use your access code as the first password.</p>
            <button type="submit" class="pb-btn pb-btn-primary" style="width:100%;">Sign in</button>
        </form>

        <form id="signupForm" class="auth-form" style="display:none;" onsubmit="return handleSignup(event)">
            <h2 class="pb-display" style="font-size:1.5rem;margin-bottom:8px;">Join the network</h2>
            <p style="color:var(--pb-muted);margin-bottom:20px;font-size:0.9rem;">Start helping animals in your community.</p>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                <input type="text" id="firstName" class="pb-field" placeholder="First name" required>
                <input type="text" id="lastName" class="pb-field" placeholder="Last name" required>
            </div>
            <input type="email" id="email" class="pb-field" placeholder="Email" required>
            <input type="tel" id="phone" class="pb-field" placeholder="Phone" required>
            <input type="password" id="password" class="pb-field" placeholder="Password" required>
            <button type="submit" class="pb-btn pb-btn-primary" style="width:100%;">Create account</button>
        </form>

        <p style="text-align:center;margin-top:24px;font-size:0.85rem;color:var(--pb-muted);">
            <a href="index.html#portals" style="color:var(--pb-brand);font-weight:700;">NGO or vet?</a> Partner portals
        </p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script>
        const firebaseConfig = { apiKey: 'AIzaSyDRuOTikCSLCdb73oYSnrnhoEiKbv-6Ozc', authDomain: 'pawbandhan-29f84.firebaseapp.com', projectId: 'pawbandhan-29f84', storageBucket: 'pawbandhan-29f84.firebasestorage.app', messagingSenderId: '378867729624', appId: '1:378867729624:web:2371a816457fdcfe2303ad' };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        function showAuthTab(t) {
            document.querySelectorAll('.pb-auth-tab').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + t).classList.add('active');
            document.getElementById('loginForm').style.display = t === 'login' ? 'block' : 'none';
            document.getElementById('signupForm').style.display = t === 'signup' ? 'block' : 'none';
        }

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            try {
                await auth.signInWithEmailAndPassword(email, password);
                sessionStorage.setItem('customer_uid', auth.currentUser.uid);
                sessionStorage.removeItem('portal_customer_uid');
                window.location.href = 'dashboard.html';
            } catch (err) {
                try {
                    const res = await fetch(PAW_SITE.api('/api/customers/portal-login'), {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, accessCode: password })
                    });
                    const data = await res.json();
                    if (res.ok && data.uid) {
                        sessionStorage.setItem('customer_uid', data.uid);
                        sessionStorage.setItem('portal_customer_name', data.name || 'Customer');
                        window.location.href = 'dashboard.html';
                        return false;
                    }
                    alert(data.error || err.message);
                } catch (e2) {
                    alert(err.message || 'Sign in failed');
                }
            }
            return false;
        }

        async function handleSignup(e) {
            e.preventDefault();
            try {
                const cred = await auth.createUserWithEmailAndPassword(document.getElementById('email').value, document.getElementById('password').value);
                await fetch(PAW_SITE.api('/api/users/register'), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        uid: cred.user.uid,
                        firstName: document.getElementById('firstName').value,
                        lastName: document.getElementById('lastName').value,
                        email: document.getElementById('email').value,
                        phone: document.getElementById('phone').value
                    })
                });
                window.location.href = 'dashboard.html';
            } catch (err) { alert(err.message); }
            return false;
        }
    </script>
</body>
</html>
