<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | PawBandhan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="pb-design-system.css">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
        }
        .auth-card {
            background: var(--pb-white);
            border-radius: var(--pb-radius-2xl);
            padding: 3rem;
            width: 100%;
            max-width: 440px;
            box-shadow: var(--pb-shadow-xl);
            position: relative;
            z-index: 1;
        }
        .auth-logo {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--pb-coral), var(--pb-coral-light));
            border-radius: var(--pb-radius-xl);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            color: white;
            font-size: 1.75rem;
            box-shadow: var(--pb-shadow-glow-coral);
        }
        .auth-title {
            text-align: center;
            font-size: 1.75rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }
        .auth-subtitle {
            text-align: center;
            color: var(--pb-text-muted);
            margin-bottom: 2rem;
        }
        .auth-tabs {
            display: flex;
            gap: 0.5rem;
            background: var(--pb-cream);
            padding: 0.375rem;
            border-radius: var(--pb-radius-lg);
            margin-bottom: 1.5rem;
        }
        .auth-tab {
            flex: 1;
            padding: 0.75rem;
            border: none;
            background: transparent;
            border-radius: var(--pb-radius-md);
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--pb-text-muted);
        }
        .auth-tab.active {
            background: var(--pb-white);
            color: var(--pb-coral);
            box-shadow: var(--pb-shadow-sm);
        }
        .auth-form {
            display: none;
        }
        .auth-form.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .auth-divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
            color: var(--pb-text-muted);
            font-size: 0.875rem;
        }
        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--pb-border);
        }
        .social-btns {
            display: flex;
            gap: 1rem;
        }
        .social-btn {
            flex: 1;
            padding: 0.875rem;
            border: 2px solid var(--pb-border);
            border-radius: var(--pb-radius-lg);
            background: var(--pb-white);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-family: inherit;
        }
        .social-btn:hover {
            border-color: var(--pb-coral);
            background: var(--pb-coral-soft);
        }
        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--pb-text-muted);
            font-size: 0.875rem;
        }
        .auth-footer a {
            color: var(--pb-coral);
            font-weight: 600;
        }
        .demo-notice {
            background: var(--pb-teal-soft);
            border: 1px solid rgba(32, 201, 151, 0.3);
            border-radius: var(--pb-radius-lg);
            padding: 1rem;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
            color: var(--pb-teal-dark);
        }
        .demo-notice strong { display: block; margin-bottom: 0.25rem; }
        .pb-input-icon {
            position: relative;
        }
        .pb-input-icon i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--pb-text-muted);
        }
        .pb-input-icon .pb-input {
            padding-left: 2.75rem;
        }
    </style>
</head>
<body>
    <div class="pb-ambient-bg">
        <div class="pb-orb pb-orb-coral pb-orb-1"></div>
        <div class="pb-orb pb-orb-teal pb-orb-2"></div>
    </div>
    
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo"><i class="fas fa-paw"></i></div>
            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-subtitle">Sign in to continue saving lives</p>
            
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">Sign In</button>
                <button class="auth-tab" data-tab="register">Create Account</button>
            </div>
            
            <div class="demo-notice">
                <strong><i class="fas fa-info-circle"></i> Demo Mode</strong>
                Use any email/password to explore. Your session will be stored locally.
            </div>
            
            <!-- Login Form -->
            <form class="auth-form active" id="loginForm">
                <div class="pb-form-group">
                    <label class="pb-label">Email or Phone</label>
                    <div class="pb-input-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="text" class="pb-input" id="loginEmail" placeholder="you@example.com" required>
                    </div>
                </div>
                <div class="pb-form-group">
                    <label class="pb-label">Password</label>
                    <div class="pb-input-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" class="pb-input" id="loginPassword" placeholder="Enter your password" required>
                    </div>
                </div>
                <button type="submit" class="pb-btn pb-btn-primary pb-btn-lg pb-w-full">
                    <i class="fas fa-sign-in-alt"></i>
                    Sign In
                </button>
            </form>
            
            <!-- Register Form -->
            <form class="auth-form" id="registerForm">
                <div class="pb-form-group">
                    <label class="pb-label">Full Name</label>
                    <div class="pb-input-icon">
                        <i class="fas fa-user"></i>
                        <input type="text" class="pb-input" id="regName" placeholder="Your full name" required>
                    </div>
                </div>
                <div class="pb-form-group">
                    <label class="pb-label">Email</label>
                    <div class="pb-input-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" class="pb-input" id="regEmail" placeholder="you@example.com" required>
                    </div>
                </div>
                <div class="pb-form-group">
                    <label class="pb-label">Phone</label>
                    <div class="pb-input-icon">
                        <i class="fas fa-phone"></i>
                        <input type="tel" class="pb-input" id="regPhone" placeholder="+91 98765 43210" required>
                    </div>
                </div>
                <div class="pb-form-group">
                    <label class="pb-label">Password</label>
                    <div class="pb-input-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" class="pb-input" id="regPassword" placeholder="Create a password" required minlength="6">
                    </div>
                </div>
                <button type="submit" class="pb-btn pb-btn-primary pb-btn-lg pb-w-full">
                    <i class="fas fa-user-plus"></i>
                    Create Account
                </button>
            </form>
            
            <div class="auth-divider">or continue with</div>
            
            <div class="social-btns">
                <button type="button" class="social-btn">
                    <i class="fab fa-google" style="color: #EA4335;"></i>
                    Google
                </button>
                <button type="button" class="social-btn">
                    <i class="fab fa-apple" style="font-size: 1.2rem;"></i>
                    Apple
                </button>
            </div>
            
            <div class="auth-footer">
                <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Home</a>
            </div>
        </div>
    </div>
    
    <script>
        // Tab switching
        document.querySelectorAll('.auth-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab + 'Form').classList.add('active');
            });
        });
        
        // Demo login
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            if (email && password) {
                sessionStorage.setItem('demo_session', 'true');
                sessionStorage.setItem('portal_customer_email', email);
                const name = email.split('@')[0];
                sessionStorage.setItem('portal_customer_name', name.charAt(0).toUpperCase() + name.slice(1));
                window.location.href = 'dashboard.html';
            }
        });
        
        // Demo register
        document.getElementById('registerForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            if (name && email) {
                sessionStorage.setItem('demo_session', 'true');
                sessionStorage.setItem('portal_customer_name', name);
                sessionStorage.setItem('portal_customer_email', email);
                sessionStorage.setItem('customer_uid', 'demo_' + Date.now());
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>
