<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Sign In | PawBandhan</title>
    
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="pb-public.css">
    <script src="config.js"></script>
    <style>
        body.pb-auth-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            position: relative;
        }
        .auth-container-glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid #fff;
            border-radius: var(--radius-lg);
            padding: 3rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            position: relative;
            z-index: 10;
        }
        .pb-auth-tabs {
            display: flex;
            background: #f3f4f6;
            border-radius: var(--radius-sm);
            padding: 0.35rem;
            margin-bottom: 2rem;
            border: 1px solid #e5e7eb;
        }
        .pb-auth-tab {
            flex: 1;
            text-align: center;
            padding: 0.75rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 700;
            color: var(--text-muted);
            transition: all 0.3s;
        }
        .pb-auth-tab.active {
            background: #fff;
            color: var(--brand-primary);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }
        .pb-field {
            width: 100%;
            padding: 1rem 1.25rem;
            margin-bottom: 1rem;
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: var(--radius-sm);
            color: var(--text-main);
            font-family: var(--font-body);
            font-size: 1rem;
            transition: all 0.3s;
        }
        .pb-field:focus {
            outline: none;
            border-color: var(--brand-primary);
            box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.15);
        }
        .auth-form-title {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }
        .auth-form-subtitle {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
    </style>
</head>
<body class="pb-public pb-auth-page">

    <!-- Ambient Background Elements -->
    <div class="ambient-bg">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="glow-orb orb-3"></div>
    </div>
    <div class="pb-paw-bg" aria-hidden="true"></div>

    <div class="auth-container-glass">
        <a href="index.html" class="pb-brand" style="margin-bottom:2rem; justify-content: center;">
            <span class="brand-icon-glass"><i class="fas fa-paw"></i></span>
            <span class="pb-brand-text">
                <strong>PawBandhan</strong>
                <small>Rescue Network</small>
            </span>
        </a>
        
        <div class="pb-auth-tabs">
            <div class="pb-auth-tab active" id="tab-login" onclick="showAuthTab('login')">Sign In</div>
            <div class="pb-auth-tab" id="tab-signup" onclick="showAuthTab('signup')">Create Account</div>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="auth-form active" onsubmit="return handleLogin(event)">
            <h2 class="auth-form-title">Welcome back</h2>
            <p class="auth-form-subtitle">Report and track animal rescues near you.</p>
            
            <input type="email" id="loginEmail" class="pb-field" placeholder="Email address" required>
            <input type="password" id="loginPassword" class="pb-field" placeholder="Password or access code" required>
            
            <p style="font-size:0.8rem;color:var(--text-muted);margin-bottom:1.5rem;">
                <i class="fas fa-info-circle"></i> Admin-created accounts: use your access code as the first password.
            </p>
            
            <button type="submit" class="btn-glass-primary" style="width:100%; justify-content: center;">
                Sign in to Dashboard <i class="fas fa-arrow-right"></i>
            </button>
        </form>

        <!-- Signup Form -->
        <form id="signupForm" class="auth-form" style="display:none;" onsubmit="return handleSignup(event)">
            <h2 class="auth-form-title">Join the network</h2>
            <p class="auth-form-subtitle">Start helping animals in your community.</p>
            
            <div style="display:flex; gap:1rem;">
                <input type="text" id="firstName" class="pb-field" placeholder="First name" required>
                <input type="text" id="lastName" class="pb-field" placeholder="Last name" required>
            </div>
            <input type="email" id="email" class="pb-field" placeholder="Email address" required>
            <input type="tel" id="phone" class="pb-field" placeholder="Phone number" required>
            <input type="password" id="password" class="pb-field" placeholder="Create password" required>
            
            <button type="submit" class="btn-glass-primary" style="width:100%; justify-content: center;">
                Create Account <i class="fas fa-arrow-right"></i>
            </button>
        </form>

        <p style="text-align:center;margin-top:2rem;font-size:0.9rem;color:var(--text-muted);">
            <a href="index.html" class="hover-underline" style="color:var(--brand-primary);font-weight:700;">&larr; Back to Home</a>
        </p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script>
        const firebaseConfig = { apiKey: 'AIzaSyDRuOTikCSLCdb73oYSnrnhoEiKbv-6Ozc', authDomain: 'pawbandhan-29f84.firebaseapp.com', projectId: 'pawbandhan-29f84', storageBucket: 'pawbandhan-29f84.firebasestorage.app', messagingSenderId: '378867729624', appId: '1:378867729624:web:2371a816457fdcfe2303ad' };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        function showAuthTab(t) {
            document.querySelectorAll('.pb-auth-tab').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + t).classList.add('active');
            document.getElementById('loginForm').style.display = t === 'login' ? 'block' : 'none';
            document.getElementById('signupForm').style.display = t === 'signup' ? 'block' : 'none';
        }

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            try {
                const cred = await auth.signInWithEmailAndPassword(email, password);
                sessionStorage.setItem('customer_uid', cred.user.uid);
                sessionStorage.removeItem('portal_customer_uid');
                if (cred.user.displayName) sessionStorage.setItem('portal_customer_name', cred.user.displayName);
                window.location.href = 'dashboard.html';
            } catch (err) {
                try {
                    const res = await fetch(PAW_SITE.api('/api/customers/portal-login'), {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, accessCode: password })
                    });
                    const data = await res.json();
                    if (res.ok && data.uid) {
                        sessionStorage.setItem('customer_uid', data.uid);
                        sessionStorage.setItem('portal_customer_name', data.name || 'Customer');
                        window.location.href = 'dashboard.html';
                        return false;
                    }
                    alert(data.error || err.message);
                } catch (e2) {
                    alert(err.message || 'Sign in failed');
                }
            }
            return false;
        }

        async function handleSignup(e) {
            e.preventDefault();
            try {
                const cred = await auth.createUserWithEmailAndPassword(document.getElementById('email').value, document.getElementById('password').value);
                await fetch(PAW_SITE.api('/api/users/register'), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        uid: cred.user.uid,
                        firstName: document.getElementById('firstName').value,
                        lastName: document.getElementById('lastName').value,
                        email: document.getElementById('email').value,
                        phoneNo: document.getElementById('phone').value,
                        role: 'customer'
                    })
                });
                sessionStorage.setItem('customer_uid', cred.user.uid);
                const fn = document.getElementById('firstName').value.trim();
                const ln = document.getElementById('lastName').value.trim();
                sessionStorage.setItem('portal_customer_name', (fn + ' ' + ln).trim());
                window.location.href = 'dashboard.html';
            } catch (err) { alert(err.message); }
            return false;
        }
    </script>
</body>
</html>
