<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veterinarian | PawBandhan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="pb-design-system.css">
    <style>
        .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; position: relative; }
        .auth-card { background: var(--pb-white); border-radius: var(--pb-radius-2xl); padding: 3rem; width: 100%; max-width: 440px; box-shadow: var(--pb-shadow-xl); position: relative; z-index: 1; }
        .auth-logo { width: 64px; height: 64px; background: linear-gradient(135deg, var(--pb-sky), #7DD3FC); border-radius: var(--pb-radius-xl); display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; color: white; font-size: 1.75rem; }
        .auth-title { text-align: center; font-size: 1.75rem; font-weight: 800; margin-bottom: 0.5rem; }
        .auth-subtitle { text-align: center; color: var(--pb-text-muted); margin-bottom: 2rem; }
        .pb-input-icon { position: relative; }
        .pb-input-icon i { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--pb-text-muted); }
        .pb-input-icon .pb-input { padding-left: 2.75rem; }
        .demo-notice { background: var(--pb-sky-soft); border: 1px solid rgba(116, 192, 252, 0.3); border-radius: var(--pb-radius-lg); padding: 1rem; margin-bottom: 1.5rem; font-size: 0.875rem; color: #0369A1; }
        .demo-notice strong { display: block; margin-bottom: 0.25rem; }
        .auth-footer { text-align: center; margin-top: 1.5rem; color: var(--pb-text-muted); font-size: 0.875rem; }
        .auth-footer a { color: #0369A1; font-weight: 600; }
    </style>
</head>
<body>
    <div class="pb-ambient-bg">
        <div class="pb-orb pb-orb-teal pb-orb-1"></div>
        <div class="pb-orb pb-orb-sky pb-orb-2"></div>
    </div>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo"><i class="fas fa-stethoscope"></i></div>
            <h1 class="auth-title">Veterinarian Portal</h1>
            <p class="auth-subtitle">Join our network of animal care heroes</p>
            <div class="demo-notice">
                <strong><i class="fas fa-info-circle"></i> Demo Mode</strong>
                Enter any credentials to explore.
            </div>
            <form id="loginForm">
                <div class="pb-form-group">
                    <label class="pb-label">Email</label>
                    <div class="pb-input-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" class="pb-input" id="loginEmail" placeholder="vet@clinic.com" required>
                    </div>
                </div>
                <div class="pb-form-group">
                    <label class="pb-label">Password</label>
                    <div class="pb-input-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" class="pb-input" id="loginPassword" placeholder="Your password" required>
                    </div>
                </div>
                <button type="submit" class="pb-btn pb-btn-lg pb-w-full" style="background: linear-gradient(135deg, var(--pb-sky), #7DD3FC); color: #0369A1;">
                    <i class="fas fa-sign-in-alt"></i>
                    Access Portal
                </button>
            </form>
            <div class="auth-footer">
                <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Home</a>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            sessionStorage.setItem('demo_session', 'true');
            sessionStorage.setItem('doctor_name', 'Dr. Priya');
            window.location.href = 'doctor_dashboard.html';
        });
    </script>
</body>
</html>
