name: pawbandhan_app
description: PawBandhan - Animal Rescue Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  shared_preferences: ^2.2.0
  google_maps_flutter: ^2.5.0
  url_launcher: ^6.2.0
  image_picker: ^1.0.0
  intl: ^0.18.0
  geolocator: ^10.0.0
  geocoding: ^2.1.0
  path_provider: ^2.1.0
  cupertino_icons: ^1.0.6
  flutter_secure_storage: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
