# Render Blueprint — https://render.com
# After connect: set DATABASE_URL in the service Environment tab (Neon pooler URL).
services:
  - type: web
    name: pawbandhan-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: cd backend_api && npm install --omit=dev
    startCommand: node backend_api/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        sync: false
